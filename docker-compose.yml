services:
  poker:
    build: .
    container_name: dezhou-poker
    restart: unless-stopped
    ports:
      - "3001:3001"      # 直接暴露，或改为 "80:3001" 搭配域名
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-change_this_secret_in_production}
    volumes:
      - poker-db:/app/server/src/data   # SQLite 持久化

volumes:
  poker-db:
